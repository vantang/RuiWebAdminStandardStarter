name: Feature request
description: 提出新能力、模板增强或开源协作改进建议。
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        请优先说明“为什么需要”以及“它是否适合作为模板主干能力”。

        如果你主要是想询问“怎么用”“怎么改”“为什么这样设计”，请改用 `Support request`。
  - type: input
    id: summary
    attributes:
      label: 需求标题
      placeholder: 例如：增加基础审计日志页模板
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: 背景与目标
      description: 这个需求想解决什么问题？它面向什么场景？
      placeholder: 请说明业务背景、使用场景和预期收益。
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - 前端模板
        - Mock 接口
        - 文档规范
        - 工程规范
        - 开源协作配置
        - 其他
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你期望如何实现？如有替代方案也请说明。
      placeholder: 描述理想形态、约束、交互或实现方向。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 如果不做这项能力，目前有哪些可接受的替代做法？
      placeholder: 例如：继续手工复制、以文档约定代替、放在业务项目而不是模板主干。
  - type: textarea
    id: non_goals
    attributes:
      label: 非目标或边界
      description: 什么不应该被包含进这次需求中？
      placeholder: 例如：不需要接真实后端、不引入新 UI 框架。
  - type: dropdown
    id: contribution
    attributes:
      label: 是否愿意参与实现
      options:
        - 可以，我愿意提交 PR
        - 可以，我愿意先补文档或方案
        - 暂时不方便，只提出建议
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: 参考资料
      description: 可选，贴参考项目、截图、规范链接等。
